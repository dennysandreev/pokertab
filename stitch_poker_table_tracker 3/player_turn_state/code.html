                        "on-surface": "#e5e2e1",
                        "tertiary-container": "#e2e2e2",
                        "surface-container-highest": "#353434",
                        "on-primary-fixed": "#1a1c1c",

                    "borderRadius": {

                    "spacing": {

                        "md": "16px",
                        "xl": "32px",
                        "sm": "12px",
                        "safe-area-inset": "16px",
                        "lg": "24px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "label-caps": ["Inter"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-sm": ["Inter"],
                        "title-sm": ["Inter"],

                        "body-md": ["Inter"]

                    "fontSize": {
                        "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],

<style>
        .glass-panel {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .poker-felt {
            background: radial-gradient(circle at center, #1a1a1a 0%, #0f0f0f 100%);
        }
        .bet-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #4edea3;
            border-radius: 50%;
            cursor: pointer;
            border: 4px solid #141313;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-md h-12 bg-surface/80 backdrop-blur-md border-b border-white/10">
<div class="flex items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-surface-container-high border border-white/10 flex items-center justify-center overflow-hidden">
<img alt="User" data-alt="A professional high-resolution avatar of a sophisticated poker player in a dark studio setting. The lighting is moody and cinematic with soft highlights on the face, emphasizing an analytical and focused expression. The background is a deep charcoal grey with subtle bokeh effects from distant luxury lounge lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAPxD6hlTZwmrx4Ed4XZi8i8QZZPiRZQUpFfNH0ej5iKLyRqp9NV77CvpPwoPgLh0GU1vF-1RIciIexWg3QWeeyFD_qICIiar4o4NQKrSVLgJDtH-SWGq-nMJ900zD-dCk2yOg2OXjzGTuVvA2ZQrkX-j2DOuCumVfoM6lqhBYcFhfriM_PHCSfCCA4-phpGgpc3bHIZFxLaqj2M18ArJeSH1rKEx8-iL_W4BZiYJTcl-qaIw-hIE25fTrOzE0kA4HamWbj2gLurwk"/>
</div>
<span class="font-headline-md-mobile text-headline-md-mobile font-bold text-on-surface">Poker Table</span>
</div>
<button class="w-10 h-10 flex items-center justify-center text-secondary hover:bg-surface-container-high transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Game Canvas -->
<main class="flex-grow poker-felt relative pt-12 pb-safe-area-inset flex flex-col items-center justify-center overflow-hidden">
<!-- Table Center Info -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 text-center">
<div class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-base">Current Pot</div>
<div class="font-display-lg text-display-lg text-primary">$4,250</div>
<!-- Community Cards (Sample) -->
<div class="flex gap-xs mt-lg">
<div class="w-10 h-14 bg-white rounded-base flex flex-col items-center justify-center text-surface-dim font-bold shadow-lg">
<span class="text-xs">10</span>
<span class="text-error text-xl">♥</span>
</div>
<div class="w-10 h-14 bg-white rounded-base flex flex-col items-center justify-center text-surface-dim font-bold shadow-lg">
<span class="text-xs">Q</span>
<span class="text-error text-xl">♦</span>
</div>
<div class="w-10 h-14 bg-white rounded-base flex flex-col items-center justify-center text-surface-dim font-bold shadow-lg">
<span class="text-xs">8</span>
<span class="text-surface-dim text-xl">♠</span>
</div>
<div class="w-10 h-14 bg-surface-container/40 border border-white/10 rounded-base"></div>
<div class="w-10 h-14 bg-surface-container/40 border border-white/10 rounded-base"></div>
</div>
</div>
<!-- Timer Overlay (Subtle Ring around Player) -->
<div class="absolute bottom-48 left-1/2 -translate-x-1/2 text-center z-10">
<div class="inline-flex items-center gap-xs px-md py-xs rounded-full bg-error-container/20 border border-error/30">
<span class="material-symbols-outlined text-error text-sm" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-title-sm text-title-sm text-error font-mono">04:37</span>
</div>
</div>
<!-- Active Hand Highlight -->
<div class="absolute bottom-24 left-1/2 -translate-x-1/2 flex gap-md z-20">
<div class="w-20 h-28 bg-white rounded-lg flex flex-col items-between p-xs text-surface-dim font-bold shadow-2xl scale-110 border-2 border-secondary ring-4 ring-secondary/20">
<div class="text-lg leading-none">A</div>
<div class="flex-grow flex items-center justify-center text-4xl text-error">♦</div>
<div class="text-lg leading-none self-end rotate-180">A</div>
</div>
<div class="w-20 h-28 bg-white rounded-lg flex flex-col items-between p-xs text-surface-dim font-bold shadow-2xl scale-110 border-2 border-secondary ring-4 ring-secondary/20">
<div class="text-lg leading-none">K</div>
<div class="flex-grow flex items-center justify-center text-4xl">♣</div>
<div class="text-lg leading-none self-end rotate-180">K</div>
</div>
</div>
</main>
<!-- Player Turn Action Sheet -->
<section class="fixed bottom-0 left-0 w-full z-50 glass-panel rounded-t-xl px-md pt-lg pb-safe-area-inset shadow-2xl">
<!-- Bet Sizing Info -->
<div class="flex justify-between items-end mb-lg">
<div>
<span class="font-label-caps text-label-caps text-on-surface-variant block">TO CALL</span>
<span class="font-headline-md text-headline-md text-primary">$100</span>
</div>
<div class="text-right">
<span class="font-label-caps text-label-caps text-on-surface-variant block">BET AMOUNT</span>
<span class="font-headline-md text-headline-md text-secondary">$350</span>
</div>
</div>
<!-- Slider -->
<div class="relative w-full mb-xl px-xs">
<input class="bet-slider w-full h-1 bg-surface-container-highest rounded-full appearance-none cursor-pointer" max="2500" min="100" type="range" value="350"/>
<div class="flex justify-between mt-xs px-1">
<button class="font-label-caps text-[10px] text-on-surface-variant bg-surface-container-high px-xs py-0.5 rounded-base">MIN</button>
<button class="font-label-caps text-[10px] text-on-surface-variant bg-surface-container-high px-xs py-0.5 rounded-base">1/2 POT</button>
<button class="font-label-caps text-[10px] text-on-surface-variant bg-surface-container-high px-xs py-0.5 rounded-base">ALL-IN</button>
</div>
</div>
<!-- Primary Action Grid -->
<div class="grid grid-cols-3 gap-sm mb-lg">
<button class="h-14 flex flex-col items-center justify-center bg-surface-container-high text-on-surface rounded-xl border border-white/5 active:scale-95 transition-transform">
<span class="font-label-caps text-label-caps opacity-70">FOLD</span>
<span class="material-symbols-outlined text-sm">close</span>
</button>
<button class="h-14 flex flex-col items-center justify-center bg-secondary text-on-secondary rounded-xl font-bold active:scale-95 transition-transform">
<span class="font-label-caps text-label-caps">CALL</span>
<span class="font-title-sm text-title-sm">$100</span>
</button>
<button class="h-14 flex flex-col items-center justify-center bg-secondary-container text-white rounded-xl font-bold active:scale-95 transition-transform border border-secondary/30">
<span class="font-label-caps text-label-caps">RAISE TO</span>
<span class="font-title-sm text-title-sm">$350</span>
</button>
</div>
</section>
<!-- BottomNavBar (Suppressed as per "Task-Focused" rule, but included logic check: we're in a modal state/action focus, but provided JSON shows it exists. I will render it at 0 opacity or hidden to respect the 'shell' suppression but keep the code available if user navigates back) -->
<nav class="hidden">
<div class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-md pb-safe-area-inset pt-xs bg-surface-container/90 backdrop-blur-xl border-t border-white/5">
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-secondary font-bold">
<span class="material-symbols-outlined" data-icon="casino" style="font-variation-settings: 'FILL' 1;">casino</span>
<span class="font-label-caps text-label-caps">Games</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-caps text-label-caps">Ranking</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</div>
</div>
</nav>
</body></html>
