<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary": "#4edea3",
                    "inverse-surface": "#e5e2e1",
                    "inverse-on-surface": "#313030",
                    "tertiary": "#ffffff",
                    "on-tertiary-container": "#636565",
                    "surface-container": "#201f1f",
                    "secondary-fixed-dim": "#4edea3",
                    "surface-container-high": "#2a2a2a",
                    "tertiary-fixed": "#e2e2e2",
                    "error-container": "#93000a",
                    "on-secondary": "#003824",
                    "surface-container-lowest": "#0e0e0e",
                    "primary-fixed": "#e2e2e2",
                    "on-secondary-fixed-variant": "#005236",
                    "on-secondary-container": "#00311f",
                    "surface-tint": "#c6c6c7",
                    "surface-container-low": "#1c1b1b",
                    "primary-fixed-dim": "#c6c6c7",
                    "on-tertiary": "#2f3131",
                    "on-background": "#e5e2e1",
                    "on-primary-container": "#636565",
                    "secondary-fixed": "#6ffbbe",
                    "secondary-container": "#00a572",
                    "on-surface-variant": "#c4c7c8",
                    "on-secondary-fixed": "#002113",
                    "on-surface": "#e5e2e1",
                    "tertiary-container": "#e2e2e2",
                    "surface-container-highest": "#353434",
                    "on-primary-fixed": "#1a1c1c",
                    "background": "#141313",
                    "surface-variant": "#353434",
                    "primary": "#ffffff",
                    "error": "#ffb4ab",
                    "surface-dim": "#141313",
                    "outline": "#8e9192",
                    "on-primary-fixed-variant": "#454747",
                    "on-tertiary-fixed": "#1a1c1c",
                    "on-error-container": "#ffdad6",
                    "outline-variant": "#444748",
                    "on-error": "#690005",
                    "tertiary-fixed-dim": "#c6c6c7",
                    "on-primary": "#2f3131",
                    "primary-container": "#e2e2e2",
                    "surface": "#141313",
                    "on-tertiary-fixed-variant": "#454747",
                    "surface-bright": "#3a3939",
                    "inverse-primary": "#5d5f5f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xs": "8px",
                    "md": "16px",
                    "xl": "32px",
                    "sm": "12px",
                    "safe-area-inset": "16px",
                    "lg": "24px",
                    "base": "4px"
            },
            "fontFamily": {
                    "label-caps": ["Inter"],
                    "display-lg": ["Hanken Grotesk"],
                    "body-sm": ["Inter"],
                    "title-sm": ["Inter"],
                    "headline-md": ["Hanken Grotesk"],
                    "body-md": ["Inter"]
            },
            "fontSize": {
                    "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "title-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "headline-md-mobile": ["20px", {"lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #0F0F0F;
            color: #e5e2e1;
            -webkit-font-smoothing: antialiased;
        }
        .glass-card {
            background: rgba(26, 26, 26, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-focus-ring:focus {
            outline: none;
            border-color: #4edea3;
            box-shadow: 0 0 0 1px #4edea3;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-md text-body-md selection:bg-secondary/30">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-md h-12 bg-surface/80 backdrop-blur-md border-b border-white/10">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface cursor-pointer active:scale-95 transition-transform" data-icon="arrow_back">arrow_back</span>
<h1 class="font-headline-md-mobile text-headline-md-mobile font-bold text-on-surface">Poker Table</h1>
</div>
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high transition-colors p-1 rounded-full cursor-pointer" data-icon="settings">settings</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest border border-white/10 overflow-hidden">
<img alt="User" class="w-full h-full object-cover" data-alt="A high-quality, professional user profile avatar for a fintech application. The avatar features a minimalist silhouette against a dark, sophisticated gradient background of charcoal and emerald green. The lighting is subtle and high-end, reflecting a premium digital identity for a serious poker analytics platform." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRROWQEU3OcZW68ZY09sKoinB0IX917hGJTWXivyhwnz_UR42XzdMc4gxOuTfbYgDwDg1ENWBMzfJlzImQRPAKwsCYkWNZET6Qcouu9XPhY5B4HgixpHkmaNqUjcEcNtJ2TXz7eLqx8PBRg8WZ6hk0DgpkhDJ9wM1-s0zPb9zM87fNVv5laSm9v53_a5x2nsRukEZsTs2lNV3FqWQ4rzuRX22ydOxStKrwlAGFSqINNyPG0X-qUHjDNEijZhWRKx6bIGAH-nc6kxQ"/>
</div>
</div>
</header>
<main class="pt-16 pb-32 px-md min-h-screen">
<!-- Hero Section -->
<section class="mb-lg">
<h2 class="font-display-lg text-display-lg text-primary mb-xs">Create Table</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Configure your virtual environment. All chips and transactions are strictly virtual simulations.</p>
</section>
<!-- Form Layout -->
<div class="space-y-sm">
<!-- Table Name -->
<div class="glass-card p-md rounded-xl">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-base">TABLE NAME</label>
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg px-md py-sm text-on-surface font-title-sm input-focus-ring transition-all placeholder:text-on-surface-variant/30" placeholder="e.g., Poker Weekend" type="text"/>
</div>
<!-- Game Mode (Bento Style Info) -->
<div class="grid grid-cols-2 gap-sm">
<div class="glass-card p-md rounded-xl flex flex-col justify-between border-secondary/20">
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-base">GAME MODE</label>
<p class="font-title-sm text-on-surface">Virtual Table</p>
</div>
<span class="material-symbols-outlined text-secondary text-2xl mt-md" data-icon="style" data-weight="fill">style</span>
</div>
<div class="glass-card p-md rounded-xl flex flex-col justify-between">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-base">CURRENCY</label>
<p class="font-title-sm text-on-surface">Chips (VTR)</p>
</div>
<span class="material-symbols-outlined text-on-surface-variant text-2xl mt-md" data-icon="monetization_on">monetization_on</span>
</div>
</div>
<!-- Starting Stack -->
<div class="glass-card p-md rounded-xl">
<div class="flex justify-between items-end mb-sm">
<label class="block font-label-caps text-label-caps text-on-surface-variant">STARTING STACK</label>
<span class="font-body-sm text-secondary">Virtual Chips</span>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg pl-md pr-xl py-lg text-on-surface font-display-lg input-focus-ring transition-all [appearance:textfield] [&amp;::-webkit-outer-spin-button]:appearance-none [&amp;::-webkit-inner-spin-button]:appearance-none" type="number" value="10000"/>
<div class="absolute right-md top-1/2 -translate-y-1/2 flex flex-col gap-xs">
<button class="material-symbols-outlined text-on-surface-variant hover:text-secondary transition-colors" data-icon="add_circle">add_circle</button>
<button class="material-symbols-outlined text-on-surface-variant hover:text-secondary transition-colors" data-icon="do_not_disturb_on">do_not_disturb_on</button>
</div>
</div>
</div>
<!-- Reference Value -->
<div class="glass-card p-md rounded-xl">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-base">REFERENCE CHIP VALUE</label>
<div class="flex items-center gap-md">
<div class="flex-1 relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-title-sm text-on-surface-variant">₽</span>
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg pl-xl pr-md py-sm text-on-surface font-title-sm input-focus-ring transition-all" type="text" value="0.10"/>
</div>
<div class="font-body-sm text-on-surface-variant text-right">
                        Per chip
                    </div>
</div>
</div>
<!-- Blinds -->
<div class="grid grid-cols-2 gap-sm">
<div class="glass-card p-md rounded-xl">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-base">SMALL BLIND</label>
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg px-md py-sm text-on-surface font-title-sm input-focus-ring transition-all [appearance:textfield] [&amp;::-webkit-outer-spin-button]:appearance-none [&amp;::-webkit-inner-spin-button]:appearance-none" type="number" value="50"/>
</div>
<div class="glass-card p-md rounded-xl">
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-base">BIG BLIND</label>
<input class="w-full bg-surface-container-low border border-white/10 rounded-lg px-md py-sm text-on-surface font-title-sm input-focus-ring transition-all [appearance:textfield] [&amp;::-webkit-outer-spin-button]:appearance-none [&amp;::-webkit-inner-spin-button]:appearance-none" type="number" value="100"/>
</div>
</div>
<!-- Advanced Options Toggle -->
<button class="w-full py-md flex items-center justify-center gap-xs font-label-caps text-label-caps text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-sm" data-icon="expand_more">expand_more</span>
                ADVANCED SETTINGS
            </button>
</div>
</main>
<!-- Bottom Actions Container -->
<div class="fixed bottom-0 left-0 w-full px-md pb-safe-area-inset pt-md bg-gradient-to-t from-background via-background to-transparent">
<button class="w-full h-14 bg-secondary text-on-secondary rounded-xl font-headline-md-mobile font-bold flex items-center justify-center gap-sm active:scale-[0.98] transition-transform shadow-lg shadow-secondary/10">
            Create Table
            <span class="material-symbols-outlined" data-icon="bolt" data-weight="fill">bolt</span>
</button>
<p class="text-center font-label-caps text-[10px] text-on-surface-variant/40 mt-sm uppercase tracking-widest">Calculations based on virtual stack 10,000</p>
</div>
<!-- Hidden Bottom Nav (Suppressed for transactional screen as per Mandate) -->
</body></html>
