      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

      background: radial-gradient(circle at center, #1a1b1a 0%, #0f0f0f 100%);
    }
    .glass-overlay {
      backdrop-filter: blur(8px);
      background: rgba(15, 15, 15, 0.7);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body-md overflow-hidden">

<div class="flex items-center gap-xs">
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant">
<img alt="User" class="w-full h-full object-cover" data-alt="A high-quality 3D rendered avatar of a professional poker player with a sophisticated fintech aesthetic. The character has a focused expression, wearing a minimalist dark turtleneck. The lighting is dramatic and moody, with emerald green rim lighting that highlights the contours against a deep black background, maintaining a premium and exclusive feel." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMqr5z6bRA1PDkIZ3Lty7AJiXZJvDmGimY44MQj65MkZqr38XkbcG0nA1dcGClwHjCspfMOfh1JgqdNGtvi3n8HLxJqQe1l34oMfc_CiIiNOBQzMdm71xSEzMDpeWnAVJSkgcOKgfjBu3I0O2Ji5M5hAMYVn6_nwAGFIgogpfZUjXwHvbMMzpw9dXLt8YM2hcj_7vkvnKLBfHBQHmXzp6RYuNReU2bYr2atUeNN3k_kuY8NEWoedlXGmgNotQEtC5MX_-msCZO5Vs"/>
</div>
<span class="font-headline-md text-headline-md-mobile font-bold text-on-surface">Poker Table</span>
</div>
<button class="text-secondary hover:bg-surface-container-high transition-colors p-base rounded-lg active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</header>
<!-- Main Canvas: Poker Table View (Dimmed) -->
<main class="relative w-full h-screen pt-12 pb-24 poker-felt flex flex-col items-center justify-center overflow-hidden">
<!-- Game Elements (Simplified Background) -->
<div class="absolute inset-0 opacity-20 pointer-events-none flex flex-col items-center justify-center">
<!-- The Poker Table Shape -->
<div class="w-[85%] aspect-[1.8/1] border-[12px] border-surface-container-highest rounded-[100px] relative">
<!-- Community Cards -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex gap-xs">
<div class="w-10 h-14 bg-surface-container-high rounded-base border border-white/10"></div>
<div class="w-10 h-14 bg-surface-container-high rounded-base border border-white/10"></div>
<div class="w-10 h-14 bg-surface-container-high rounded-base border border-white/10"></div>
<div class="w-10 h-14 bg-white/5 rounded-base border border-white/5"></div>
<div class="w-10 h-14 bg-white/5 rounded-base border border-white/5"></div>
</div>
<!-- Player Seats -->
<div class="absolute -top-6 left-1/2 -translate-x-1/2 w-16 h-16 rounded-full bg-surface-container-high border border-white/10"></div>
<div class="absolute -bottom-6 left-1/2 -translate-x-1/2 w-16 h-16 rounded-full bg-surface-container-high border border-white/10"></div>
<div class="absolute top-1/4 -left-8 w-16 h-16 rounded-full bg-surface-container-high border border-white/10"></div>
<div class="absolute top-1/4 -right-8 w-16 h-16 rounded-full bg-surface-container-high border border-white/10"></div>
</div>
</div>
<!-- Sitting Out Low-Profile Modal -->
<div class="relative z-20 w-full max-w-[360px] mx-md">
<div class="bg-surface-container/90 backdrop-blur-xl border border-white/10 rounded-xl p-lg flex flex-col gap-lg">
<div class="flex flex-col items-center text-center gap-xs">
<div class="w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center mb-xs text-on-surface-variant">
<span class="material-symbols-outlined text-[32px]" data-icon="person_off">person_off</span>
</div>
<h2 class="font-title-sm text-title-sm text-on-surface">You are sitting out</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant px-md">
            You will rejoin after the big blind.
          </p>
</div>
<!-- Options Container -->
<div class="bg-surface-container-low rounded-lg p-md border border-white/5">
<div class="flex items-center justify-between">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-secondary" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-body-sm text-body-sm text-on-surface">Auto-check/fold enabled</span>
</div>
<div class="w-8 h-4 bg-secondary rounded-full relative">
<div class="absolute right-0.5 top-0.5 w-3 h-3 bg-white rounded-full"></div>
</div>
</div>
</div>
<button class="w-full h-12 bg-secondary text-on-secondary rounded-lg font-title-sm text-title-sm active:scale-95 transition-transform duration-200">
          Rejoin Game
        </button>
</div>
</div>
</main>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-md pb-safe-area-inset pt-xs bg-surface-container/90 backdrop-blur-xl border-t border-white/5 rounded-t-xl">

<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-caps text-label-caps">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="casino">casino</span>
<span class="font-label-caps text-label-caps">Games</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
<span class="font-label-caps text-label-caps">Ranking</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-caps text-label-caps">Profile</span>
</a>
</nav>
