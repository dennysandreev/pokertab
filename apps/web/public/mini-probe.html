<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Poker Table Check</title>
    <script>
      try {
        new Image().src = "/client-boot.gif?stage=mini-probe-head&t=" + Date.now();
      } catch (error) {
        // Ignore diagnostic failures.
      }

      try {
        var webApp = window.Telegram && window.Telegram.WebApp;

        if (webApp && typeof webApp.ready === "function") {
          webApp.ready();
          new Image().src = "/client-boot.gif?stage=mini-probe-ready&t=" + Date.now();
        }
      } catch (error) {
        // Ignore Telegram diagnostic failures.
      }
    </script>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #18191d;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(320px, calc(100vw - 48px));
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #c9cbd2;
        font-size: 16px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <img src="/client-boot.gif?stage=mini-probe-body" alt="" hidden />
    <main>
      <h1>Poker Table открылся</h1>
      <p>Это проверочный экран загрузки.</p>
    </main>
  </body>
</html>
