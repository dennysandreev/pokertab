                  "error": "#ffb4ab",

                  "primary-fixed": "#e2e2e2",

                  "primary-container": "#e2e2e2",
                  "surface-container-highest": "#353434",
                  "on-tertiary-fixed-variant": "#454747",
                  "surface-bright": "#3a3939",

          },
          "borderRadius": {
                  "DEFAULT": "0.25rem",
                  "lg": "0.5rem",
                  "xl": "0.75rem",
                  "full": "9999px"
          },
          "spacing": {
                  "xl": "32px",
                  "base": "4px",
                  "safe-area-inset": "16px",
                  "xs": "8px",
                  "sm": "12px",
                  "md": "16px",
                  "lg": "24px"
          },
          "fontFamily": {
                  "headline-md": ["Hanken Grotesk"],
                  "label-caps": ["Inter"],
                  "display-lg": ["Hanken Grotesk"],
                  "body-md": ["Inter"],
                  "title-sm": ["Inter"],
                  "body-sm": ["Inter"]
          },
          "fontSize": {
                  "headline-md": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                  "label-caps": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                  "display-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

                  "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}]
          }
        },
      },
    }
  </script>
<style>
    body {
      background-color: #0F0F0F;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .loader-track {
      height: 4px;
      width: 120px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
      overflow: hidden;
      position: relative;
    }
    .loader-fill {
      position: absolute;
      left: -100%;
      width: 100%;
      height: 100%;
      background: #4edea3;
      border-radius: 9999px;
      animation: loading 2s infinite ease-in-out;
    }
    @keyframes loading {
      0% { left: -100%; }
      50% { left: 0; }
      100% { left: 100%; }
    }
  </style>
</head>
<body class="dark bg-background text-on-background flex flex-col items-center justify-between min-h-screen py-lg">
<!-- Main Content Container -->
<div class="flex-1 flex flex-col items-center justify-center w-full px-md">
<!-- Logo Section -->
<div class="relative w-24 h-24 mb-lg flex items-center justify-center">
<img alt="Poker Table Logo" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujOkpiUmAHETQ00WIgmyZHrAZ0Il1b2QDdx3EedckmI1XbjumI0N8FvnDz1G3gLBQDHun2ni1OYdrHKFJHTQ57-THgQhg08YbAo1e_bfneXVyVXDfqz1Gz8AOtk0HOybaQNQT5syPn85UN-s5PVYj4j2ChP6-qC3BJA1NPx2mDdNQ3IhLHfdi-ZTFneJPOuj2BFmi9GjycqAau4f7_Ud_LwTNW1youjfNsXP4-UcB_Gw5ZWVNreWOoIdv4"/>
</div>
<!-- App Title Section -->
<div class="text-center mb-xl">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">
        Poker Table
      </h1>
</div>
<!-- Loading Indicator -->
<div class="flex flex-col items-center gap-sm mt-md">
<div class="loader-track">
<div class="loader-fill"></div>
</div>
</div>
</div>
<!-- Footer Section -->
<div class="w-full text-center pb-safe-area-inset mb-md">
<p class="font-label-caps text-label-caps text-on-tertiary-container uppercase tracking-[0.1em] opacity-80">
      Clean utility for private games
    </p>
</div>
<!-- Decorative Gradient Overlay (Subtle Depth) -->
<div class="fixed inset-0 pointer-events-none z-[-1] opacity-20" style="background: radial-gradient(circle at center, #1A1A1A 0%, #0F0F0F 100%);">
</div>
</body></html>
